<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Txdo — Terminal Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Matrix Rain Canvas -->
  <canvas id="matrix-rain"></canvas>

  <!-- CRT Overlay Effects -->
  <div class="crt-overlay">
    <div class="scanlines"></div>
    <div class="flicker"></div>
  </div>

  <!-- Boot Screen -->
  <div id="boot-screen" class="boot-screen">
    <pre id="boot-log"></pre>
  </div>

  <!-- Main Terminal -->
  <div id="terminal" class="terminal hidden">
    <div class="terminal-header">
      <div class="terminal-buttons">
        <span class="btn-close"></span>
        <span class="btn-minimize"></span>
        <span class="btn-maximize"></span>
      </div>
      <div class="terminal-title">txdo@portfolio:~</div>
      <div class="terminal-header-right"></div>
    </div>
    <div class="terminal-body" id="terminal-body">
      <div id="output"></div>
      <div class="input-line" id="input-line">
        <span class="prompt"><span class="prompt-user">visitor</span><span class="prompt-at">@</span><span class="prompt-host">txdo.dev</span><span class="prompt-colon">:</span><span class="prompt-path">~</span><span class="prompt-dollar">$</span></span>
        <input type="text" id="command-input" autofocus autocomplete="off" spellcheck="false">
        <span class="cursor-block" id="cursor-block">█</span>
      </div>
    </div>
  </div>

  <!-- Audio (optional CRT hum) -->
  <script src="script.js"></script>
</body>
</html>
